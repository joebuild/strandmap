name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: strandmap-linux-x86_64
          - os: macos-13
            artifact: strandmap-macos-x86_64
          - os: macos-14
            artifact: strandmap-macos-aarch64
          - os: windows-latest
            artifact: strandmap-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/release/strandmap.exe "${{ matrix.artifact }}"
          else
            cp target/release/strandmap "${{ matrix.artifact }}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
